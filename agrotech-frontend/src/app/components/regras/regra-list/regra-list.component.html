<div class="regra-wrapper">
  <div class="regra-header">
    <h2>Gestão de Regras</h2>
    <button mat-raised-button color="primary" routerLink="/regras/nova">
      <mat-icon>add</mat-icon> Nova Regra
    </button>
  </div>

  <table mat-table [dataSource]="regras" class="mat-elevation-z2">

    <ng-container matColumnDef="tipoSensor">
      <th mat-header-cell *matHeaderCellDef>Tipo Sensor</th>
      <td mat-cell *matCellDef="let regra">{{ regra.tipoSensor }}</td>
    </ng-container>

    <ng-container matColumnDef="operador">
      <th mat-header-cell *matHeaderCellDef>Condição</th>
      <td mat-cell *matCellDef="let regra">{{ regra.operador }}</td>
    </ng-container>

    <ng-container matColumnDef="valor">
      <th mat-header-cell *matHeaderCellDef>Valor Limite</th>
      <td mat-cell *matCellDef="let regra">{{ regra.valor }}</td>
    </ng-container>

    <ng-container matColumnDef="ativo">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let regra">
        <span [class]="regra.ativo ? 'status-ativo' : 'status-inativo'">
          {{ regra.ativo ? 'ATIVA' : 'INATIVA' }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef>Ações</th>
      <td mat-cell *matCellDef="let regra">
        @if (regra.ativo) {
          <button mat-icon-button color="warn"
            (click)="desativar(regra.id)"
            matTooltip="Desativar regra">
            <mat-icon>toggle_on</mat-icon>
          </button>
        } @else {
          <button mat-icon-button color="primary"
            (click)="ativar(regra.id)"
            matTooltip="Ativar regra">
            <mat-icon>toggle_off</mat-icon>
          </button>
        }
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="colunas"></tr>
    <tr mat-row *matRowDef="let row; columns: colunas;"></tr>
  </table>
</div>
