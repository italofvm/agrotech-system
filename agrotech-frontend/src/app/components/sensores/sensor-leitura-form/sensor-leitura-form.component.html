<div class="telemetria-wrapper">
  <mat-card class="telemetria-card mat-elevation-z4">
    <mat-card-header>
      <mat-icon mat-card-avatar color="primary">sensors</mat-icon>
      <mat-card-title>Simulador de Telemetria</mat-card-title>
      <mat-card-subtitle>Envio manual de dados</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="telemetriaForm" (ngSubmit)="enviarLeitura()">
        
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Selecione o Sensor</mat-label>
          <mat-select formControlName="sensorId">
            @for (s of sensores(); track s.id) {
              <mat-option [value]="s.id">
                <span class="sensor-option-name">{{ s.nome }}</span>
                <span class="sensor-option-type"> | {{ s.tipo }} ({{ s.localizacao }})</span>
              </mat-option>
            }
          </mat-select>
        </mat-form-field>

        <div class="row">
          <mat-form-field appearance="outline" class="flex-item">
            <mat-label>Valor da Medição</mat-label>
            <input matInput type="number" formControlName="valor" placeholder="Ex: 25.4">
            <mat-icon matSuffix>settings_input_component</mat-icon>
          </mat-form-field>

          <mat-form-field appearance="outline" class="flex-item">
            <mat-label>Data e Hora da Coleta</mat-label>
            <input matInput type="datetime-local" formControlName="dataHora">
          </mat-form-field>
        </div>

        <mat-card-actions align="end">
          <button mat-raised-button color="primary" type="submit" [disabled]="telemetriaForm.invalid">
            <mat-icon>send</mat-icon> TRANSMITIR DADOS
          </button>
        </mat-card-actions>
      </form>
    </mat-card-content>
  </mat-card>
</div>
