<div class="form-wrapper">
  <mat-card class="form-card">
    <mat-card-header>
      <mat-card-title>{{ tituloComp }}</mat-card-title>
      <mat-card-subtitle>{{ subtituloComp }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="areaFormulario" (ngSubmit)="aoSubmeter()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nome da Área</mat-label>
          <input matInput formControlName="nome" placeholder="Ex: Talhão A">
          @if (areaFormulario.get('nome')?.invalid && areaFormulario.get('nome')?.touched) {
            <mat-error>Nome é obrigatório.</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Descrição</mat-label>
          <textarea matInput formControlName="descricao" placeholder="Descreva a área..."></textarea>
        </mat-form-field>

        <div class="button-group">
          <button mat-button type="button" (click)="cancelar()">Cancelar</button>
          <button mat-raised-button color="primary" type="submit"
            [disabled]="areaFormulario.invalid">
            {{ modoEdicao ? 'Salvar' : 'Cadastrar' }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
