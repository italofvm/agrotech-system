@if (estaLogado()) {
  <!-- Shell autenticado: Sidebar + Header + Conteúdo -->
  <div class="app-shell" [class.sidebar-collapsed]="!sidebarAberta()">

    <!-- ====== SIDEBAR ====== -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <mat-icon class="logo-icon">agriculture</mat-icon>
          <span class="logo-text">AgroTech</span>
        </div>
        <button class="sidebar-toggle" (click)="toggleSidebar()" [matTooltip]="sidebarAberta() ? 'Recolher' : 'Expandir'">
          <mat-icon>{{ sidebarAberta() ? 'chevron_left' : 'chevron_right' }}</mat-icon>
        </button>
      </div>

      <nav class="sidebar-nav">
        <a class="nav-item" routerLink="/telemetria/dashboard" routerLinkActive="nav-active" [matTooltip]="!sidebarAberta() ? 'Dashboard' : ''" matTooltipPosition="right">
          <mat-icon>dashboard</mat-icon>
          <span class="nav-label">Dashboard</span>
        </a>
        <a class="nav-item" routerLink="/areas" routerLinkActive="nav-active" [matTooltip]="!sidebarAberta() ? 'Áreas' : ''" matTooltipPosition="right">
          <mat-icon>map</mat-icon>
          <span class="nav-label">Áreas</span>
        </a>
        <a class="nav-item" routerLink="/sensores" routerLinkActive="nav-active" [routerLinkActiveOptions]="{exact:true}" [matTooltip]="!sidebarAberta() ? 'Sensores' : ''" matTooltipPosition="right">
          <mat-icon>sensors</mat-icon>
          <span class="nav-label">Sensores</span>
        </a>
        <a class="nav-item" routerLink="/telemetria/simulador" routerLinkActive="nav-active" [matTooltip]="!sidebarAberta() ? 'Leituras' : ''" matTooltipPosition="right">
          <mat-icon>analytics</mat-icon>
          <span class="nav-label">Leituras</span>
        </a>
        <a class="nav-item" routerLink="/alertas" routerLinkActive="nav-active" [matTooltip]="!sidebarAberta() ? 'Alertas' : ''" matTooltipPosition="right">
          <mat-icon>notifications_active</mat-icon>
          <span class="nav-label">Alertas</span>
        </a>
        <a class="nav-item" routerLink="/regras" routerLinkActive="nav-active" [matTooltip]="!sidebarAberta() ? 'Regras' : ''" matTooltipPosition="right">
          <mat-icon>rule</mat-icon>
          <span class="nav-label">Regras</span>
        </a>

      </nav>

      <div class="sidebar-footer">
        <button class="nav-item nav-logout" (click)="sair()" [matTooltip]="!sidebarAberta() ? 'Sair' : ''" matTooltipPosition="right">
          <mat-icon>logout</mat-icon>
          <span class="nav-label">Sair</span>
        </button>
      </div>
    </aside>

    <!-- ====== ÁREA PRINCIPAL ====== -->
    <div class="main-area">

      <!-- Header fixo -->
      <header class="app-header">
        <div class="header-left">
          <span class="header-brand">AgroTech System</span>
        </div>
        <div class="header-right">
          <button mat-icon-button matTooltip="Notificações" class="header-action-btn">
            <mat-icon>notifications_none</mat-icon>
          </button>
          <button mat-icon-button [matMenuTriggerFor]="userMenu" class="header-avatar-btn" matTooltip="Minha conta">
            <mat-icon>account_circle</mat-icon>
          </button>
          <mat-menu #userMenu="matMenu">
            <div class="user-menu-header">
              <mat-icon>account_circle</mat-icon>
              <span>Minha conta</span>
            </div>
            <mat-divider></mat-divider>
            <button mat-menu-item (click)="sair()">
              <mat-icon>logout</mat-icon>
              <span>Sair</span>
            </button>
          </mat-menu>
        </div>
      </header>

      <!-- Conteúdo da rota -->
      <main class="page-content">
        <router-outlet />
      </main>
    </div>

  </div>

} @else {
  <!-- Páginas públicas (Login / Cadastro) -->
  <router-outlet />
}
